name: Deploy Chatbot

on:
  push:
    branches:
      - main  # change to 'master' if your branch is master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v3

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # use the Python version your bot requires

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -s requirements.txt ]; then pip install -r requirements.txt; else echo "No dependencies to install."; fi

    - name: 🚀 Run chatbot (for testing only)
      run: |
        python app.py
